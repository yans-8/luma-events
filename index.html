<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Events · Attendees</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
  .header { background: #fff; border-bottom: 1px solid #e5e5ea; padding: 28px 36px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; color: #6e6e73; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 28px 36px; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5ea; padding: 20px; text-decoration: none; color: inherit; transition: box-shadow .15s, transform .15s; display: block; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); transform: translateY(-2px); }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .card-meta { font-size: 12px; color: #6e6e73; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: #e8f0fe; color: #1a56db; margin-top: 10px; }
</style>
</head>
<body>
<div class="header">
  <h1>Luma Events</h1>
  <p>Attendee lists</p>
</div>
<div class="grid">
  <a class="card" href="/annie-and-everett/">
    <div class="card-title">Welcome, Annie &amp; Everett — New Senior Associates</div>
    <div class="card-meta">30 attendees</div>
    <span class="badge">View attendees →</span>
  </a>
  <a class="card" href="/energy-and-eggs/">
    <div class="card-title">Energy &amp; Eggs</div>
    <div class="card-meta">Attendee list</div>
    <span class="badge">View attendees →</span>
  </a>
  <a class="card" href="/fischtank-pr-happy-hour/">
    <div class="card-title">FischTank PR Happy Hour</div>
    <div class="card-meta">61 attendees</div>
    <span class="badge">View attendees →</span>
  </a>
  <a class="card" href="/climate-happy-hour/">
    <div class="card-title">Climate Happy Hour</div>
    <div class="card-meta">15 attendees</div>
    <span class="badge">View attendees →</span>
  </a>
</div>
</body>
</html>
