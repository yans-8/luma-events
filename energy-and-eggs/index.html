// ── Classification helpers ──────────────────────────────────────────────────

function getSegment(r) {
  const title   = (r[2]||'').toLowerCase();
  const company = (r[3]||'').toLowerCase();
  const about   = (r[7]||'').toLowerCase();

  // Press
  const pressTitles = ['reporter','journalist','correspondent','editor','producer','writer & editor'];
  if (pressTitles.some(t => title.includes(t))) return 'Press';

  // PR / Agency
  if (['account director','account manager','media relations','public relations'].some(t => title.includes(t))) return 'PR/Agency';
  if (title.includes('communications') && !title.includes('co-founder') && !title.includes('ceo')) return 'PR/Agency';

  // Investor / VC
  if (company.includes('ventures') || company.includes('capital') || company.includes('investments')) return 'Investor/VC';
  if (['investor','managing partner','venture partner','general partner','principal'].some(t => title.includes(t))) return 'Investor/VC';
  if (about.includes('family office') || about.includes('sfo')) return 'Investor/VC';
  if (about.includes('investing in') && (about.includes('seed') || about.includes('series') || about.includes('fund'))) return 'Investor/VC';
  if (title.includes('entrepreneur') && title.includes('investor')) return 'Investor/VC';

  // Founder / Startup
  if (['founder','co-founder','ceo','cofounder'].some(t => title.includes(t))) return 'Founder';
  if (about.includes('serial entrepreneur')) return 'Founder';

  return 'Other';
}

function getSeniority(title) {
  if (!title) return '';
  const t = title.toLowerCase();
  if (/\bceo\b|\bcfo\b|\bcoo\b|\bcto\b|\bcmo\b|chief |managing partner|\bfounder\b|co-founder|cofounder|president/.test(t)) return 'C-Suite';
  if (/\bvp\b|vice president|\bsvp\b|\bevp\b|\bdirector\b|\bpartner\b/.test(t)) return 'VP/Dir';
  if (/\bsenior\b|\bsr\.\b|head of|lead |principal|\bmanager\b/.test(t)) return 'Senior';
  if (/\bassociate\b|\banalyst\b|\bcoordinator\b|account executive|specialist/.test(t)) return 'Associate';
  return '';
}

function isWorthMeeting(seg) {
  return seg === 'Investor/VC' || seg === 'Founder';
}

// ── Expanded rows ────────────────────────────────────────────────────────────

const expandedRows = new Set();

function toggleExpand(name) {
  if (expandedRows.has(name)) expandedRows.delete(name); else expandedRows.add(name);
  document.querySelectorAll('tr[data-name]').forEach(tr => {
    if (tr.dataset.name !== name) return;
    const expanded = expandedRows.has(name);
    const aboutDiv = tr.querySelector('.about-text');
    const btn      = tr.querySelector('.expand-btn');
    if (aboutDiv) aboutDiv.classList.toggle('expanded', expanded);
    if (btn)      btn.classList.toggle('open', expanded);
  });
}

const STORE_KEY = 'energy_eggs_starred';
function getStarred() {
  try { return new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]')); } catch { return new Set(); }
}
function saveStarred(set) { localStorage.setItem(STORE_KEY, JSON.stringify([...set])); }
function toggleStar(name, cb) {
  const s = getStarred();
  if (cb.checked) s.add(name); else s.delete(name);
  saveStarred(s);
  updateOpenStarredBtn();
  if (document.getElementById('filterStarred').checked) renderTable();
}

// ── LI icons ─────────────────────────────────────────────────────────────────

const LI_PATH = `M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z`;
const LI_SVG        = `<svg width="20" height="20" viewBox="0 0 24 24" fill="#0a66c2"><path d="${LI_PATH}"/></svg>`;
const LI_SVG_YELLOW = `<svg width="20" height="20" viewBox="0 0 24 24" fill="#FCC200"><path d="${LI_PATH}"/></svg>`;
const LI_SVG_GREY   = `<svg width="20" height="20" viewBox="0 0 24 24" fill="#ccc"><path d="${LI_PATH}"/></svg>`;

const SEG_CONFIG = {
  'Investor/VC': { cls: 'tag-investor', label: 'Investor/VC' },
  'Founder':     { cls: 'tag-founder',  label: 'Founder'     },
  'Press':       { cls: 'tag-press',    label: 'Press'        },
  'PR/Agency':   { cls: 'tag-agency',   label: 'PR/Agency'    },
  'Other':       { cls: 'tag-other',    label: 'Other'        },
};

// ── State ─────────────────────────────────────────────────────────────────────

let sortCol = null, sortAsc = true;
let activeSegment = 'all';

const SEG_ORDER      = { 'Investor/VC': 0, 'Founder': 1, 'Other': 2, 'Press': 3, 'PR/Agency': 4 };
const SENIORITY_ORDER = { 'C-Suite': 0, 'VP/Dir': 1, 'Senior': 2, 'Associate': 3, '': 4 };

function prioritySort(a, b) {
  const sa = SEG_ORDER[getSegment(a)] ?? 5, sb = SEG_ORDER[getSegment(b)] ?? 5;
  if (sa !== sb) return sa - sb;
  const ra = SENIORITY_ORDER[getSeniority(a[2])] ?? 4, rb = SENIORITY_ORDER[getSeniority(b[2])] ?? 4;
  if (ra !== rb) return ra - rb;
  return (a[1]||'').localeCompare(b[1]||'');
}

let currentData = [...DATA].sort(prioritySort);

// ── Segment cards ─────────────────────────────────────────────────────────────

function buildSegmentCards() {
  const counts = { all: DATA.length, 'Investor/VC': 0, 'Founder': 0, 'Press': 0, 'PR/Agency': 0, 'Other': 0 };
  DATA.forEach(r => { const s = getSegment(r); counts[s] = (counts[s]||0) + 1; });

  const labels = [
    { seg: 'all',         emoji: '👥', label: 'All' },
    { seg: 'Investor/VC', emoji: '💼', label: 'Investor / VC' },
    { seg: 'Founder',     emoji: '🚀', label: 'Founders' },
    { seg: 'Other',       emoji: '🔹', label: 'Other' },
  ];

  const container = document.getElementById('segmentCards');
  container.innerHTML = '';
  labels.forEach(({ seg, emoji, label }) => {
    if (!counts[seg] && seg !== 'all') return;
    const card = document.createElement('div');
    card.className = 'seg-card' + (seg === activeSegment ? ' active' : '');
    card.dataset.seg = seg;
    card.innerHTML = `<div class="seg-count">${counts[seg] || 0}</div><div class="seg-label">${emoji} ${label}</div>`;
    card.addEventListener('click', () => {
      activeSegment = seg;
      document.querySelectorAll('.seg-card').forEach(c => c.classList.toggle('active', c.dataset.seg === seg));
      renderTable();
    });
    container.appendChild(card);
  });
}

// ── Open-starred button ───────────────────────────────────────────────────────

function updateOpenStarredBtn() {
  const starred = getStarred();
  let btn = document.getElementById('openStarredBtn');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'openStarredBtn';
    btn.className = 'open-starred-btn';
    btn.onclick = openAllStarred;
    document.getElementById('batchButtons').prepend(btn);
  }
  btn.style.display = starred.size ? 'inline-block' : 'none';
  btn.textContent = `⭐ Open ${starred.size} Starred`;
}

function openAllStarred() {
  const starred = getStarred();
  const urls = DATA.filter(r => r[5] && starred.has(r[1])).map(r => r[5]);
  if (!urls.length) return;
  const s = urls.map(x => 'window.open(' + JSON.stringify(x) + ',"_blank");').join('');
  const p = '<html><body><script>window.onload=function(){' + s + 'window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ' + urls.length + ' profiles\u2026</p></body></html>';
  window.open(URL.createObjectURL(new Blob([p], {type:'text/html'})), '_blank');
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderTable() {
  const search      = document.getElementById('search').value.toLowerCase();
  const fc          = document.getElementById('filterCompany').value;
  const fs          = document.getElementById('filterStatus').value;
  const starredOnly = document.getElementById('filterStarred').checked;
  const starred     = getStarred();

  const filtered = currentData.filter(r => {
    const ok1 = !search || r[1].toLowerCase().includes(search) || r[2].toLowerCase().includes(search) || r[3].toLowerCase().includes(search);
    const ok2 = !fc || r[3] === fc;
    const ok3 = !fs || r[6] === fs;
    const ok4 = activeSegment === 'all' || getSegment(r) === activeSegment;
    const ok5 = !starredOnly || starred.has(r[1]);
    return ok1 && ok2 && ok3 && ok4 && ok5;
  });

  document.getElementById('countBadge').textContent = filtered.length + ' of ' + DATA.length;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  filtered.forEach((r, i) => {
    if (i % 10 === 0) {
      const d = tbody.insertRow(); d.className = 'batch-divider';
      const c = d.insertCell(); c.colSpan = 9;
      c.textContent = 'Batch ' + (Math.floor(i/10)+1) + ' \u00B7 rows ' + (i+1) + '\u2013' + Math.min(i+10, filtered.length);
    }

    const seg        = getSegment(r);
    const seniority  = getSeniority(r[2]);
    const worth      = isWorthMeeting(seg);
    const isStarred  = starred.has(r[1]);
    const isExpanded = expandedRows.has(r[1]);

    const tr = tbody.insertRow();
    tr.dataset.name = r[1];
    if (worth) tr.classList.add('worth-meeting');

    const logo = r[4] ? 'https://www.google.com/s2/favicons?domain=' + r[4] + '&sz=64' : null;
    const about = r[7] || '';
    const aboutHtml = about
      ? '<div class="about-text' + (isExpanded ? ' expanded' : '') + '">' + about + '</div>'
      : '<span style="color:#ccc">\u2014</span>';

    const liSvg   = r[6] === 'Guessed' ? LI_SVG_YELLOW : r[6] === 'Confirmed' ? LI_SVG : LI_SVG_GREY;
    const liTitle = r[6] === 'Guessed' ? 'Guessed LinkedIn' : r[6] === 'Confirmed' ? 'Confirmed LinkedIn' : 'No LinkedIn';

    const scfg = SEG_CONFIG[seg] || SEG_CONFIG['Other'];
    let tagsHtml = '<span class="tag ' + scfg.cls + '">' + scfg.label + '</span>';
    if (worth) tagsHtml += ' <span class="tag tag-worth">&#9733; Priority</span>';

    const badgeClass = { 'C-Suite': 'badge-csuite', 'VP/Dir': 'badge-vpdir', 'Senior': 'badge-senior', 'Associate': 'badge-associate' }[seniority] || '';
    const badgeHtml  = seniority ? '<span class="badge ' + badgeClass + '">' + seniority + '</span>' : '';

    const nameAttr  = r[1].replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    const expandBtn = about
      ? '<button class="expand-btn' + (isExpanded ? ' open' : '') + '" tabindex="-1" title="Expand bio">&#9654;</button>'
      : '';

    tr.innerHTML =
      '<td class="td-cb"><input type="checkbox" class="shortlist-cb" ' + (isStarred ? 'checked' : '') + ' onchange="toggleStar(&quot;' + nameAttr + '&quot;, this)" title="Shortlist"></td>' +
      '<td class="td-photo"><img class="avatar" src="' + r[0] + '" alt="' + nameAttr + '" onerror="this.src=\'' + D + '\'"></td>' +
      '<td class="td-li">' + (r[5] ? '<a class="li-link" href="' + r[5] + '" target="_blank" rel="noopener" title="' + liTitle + '">' + liSvg + '</a>' : '<span class="li-link grey" title="' + liTitle + '">' + liSvg + '</span>') + '</td>' +
      '<td class="td-name"><span class="name-text">' + r[1] + '</span><div class="tags-row">' + tagsHtml + '</div></td>' +
      '<td class="td-title"><div class="title-wrap">' + (r[2] ? '<span>' + r[2] + '</span>' : '<span style="color:#ccc">\u2014</span>') + badgeHtml + '</div></td>' +
      '<td class="td-company"><div class="company-cell">' +
        (logo ? '<img class="company-logo" src="' + logo + '" alt="" onerror="this.style.display=\'none\'" loading="lazy">' : '') +
        '<span class="company-name">' + (r[3] || '<span style="color:#ccc">\u2014</span>') + '</span>' +
      '</div></td>' +
      '<td class="td-about">' + aboutHtml + '</td>' +
      '<td class="td-expand">' + expandBtn + '</td>';

    if (about) {
      tr.style.cursor = 'pointer';
      tr.addEventListener('click', (function(name) { return function(e) {
        if (e.target.closest('a, input')) return;
        toggleExpand(name);
      }; })(r[1]));
    }
  });

  updateBatchBtns(filtered);
}

// ── Batch buttons ─────────────────────────────────────────────────────────────

function updateBatchBtns(filtered) {
  const urls = filtered.filter(r => r[5]).map(r => r[5]);
  const wrap = document.getElementById('batchButtons');
  const existing = document.getElementById('openStarredBtn');
  wrap.innerHTML = '<span class="batch-tip">Open LinkedIn in batch (allow popups):</span>';
  if (existing) wrap.prepend(existing);
  for (let i = 0; i < urls.length; i += 10) {
    const chunk = urls.slice(i, i+10);
    const btn = document.createElement('button');
    btn.className = 'batch-btn';
    btn.textContent = 'Batch ' + (Math.floor(i/10)+1) + ' (' + chunk.length + ')';
    btn.onclick = (function(u) { return function() {
      const s = u.map(x => 'window.open(' + JSON.stringify(x) + ',"_blank");').join('');
      const p = '<html><body><script>window.onload=function(){' + s + 'window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ' + u.length + ' tabs\u2026</p></body></html>';
      window.open(URL.createObjectURL(new Blob([p], {type:'text/html'})), '_blank');
    }; })(chunk);
    wrap.appendChild(btn);
  }
}

// ── Sort ──────────────────────────────────────────────────────────────────────

function resetOrder() {
  sortCol = null; sortAsc = true;
  currentData = [...DATA].sort(prioritySort);
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    const sa = th.querySelector('.sort-arrow');
    if (sa) sa.innerHTML = '&#8597;';
  });
  document.getElementById('resetOrderBtn').style.display = 'none';
  renderTable();
}

function sortBy(col) {
  const idx = { name:1, title:2, company:3, about:7 };
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  const i = idx[col];
  currentData.sort((a, b) => {
    const av = (a[i]||'').toLowerCase(), bv = (b[i]||'').toLowerCase();
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    const sa = th.querySelector('.sort-arrow');
    if (sa) sa.innerHTML = '&#8597;';
  });
  const colMap = { name: 3, title: 4, company: 5, about: 6 };
  const thIdx  = colMap[col];
  if (thIdx !== undefined) {
    const th = document.querySelectorAll('thead th')[thIdx];
    if (th) { th.classList.add('sorted'); const sa = th.querySelector('.sort-arrow'); if (sa) sa.innerHTML = sortAsc ? '&#8593;' : '&#8595;'; }
  }
  document.getElementById('resetOrderBtn').style.display = 'inline-block';
  renderTable();
}

// ── Init ──────────────────────────────────────────────────────────────────────

(function populateFilters() {
  const companies = [...new Set(DATA.map(r => r[3]).filter(Boolean))].sort();
  const sel = document.getElementById('filterCompany');
  companies.forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; sel.appendChild(o); });
})();

document.getElementById('search').addEventListener('input', renderTable);
document.getElementById('filterCompany').addEventListener('change', renderTable);
document.getElementById('filterStatus').addEventListener('change', renderTable);
document.getElementById('filterStarred').addEventListener('change', renderTable);

buildSegmentCards();
updateOpenStarredBtn();
renderTable();
</script>
