<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FischTank PR Happy Hour · Attendees</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a1a; }
  .header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 20px 28px; }
  .header h1 { font-size: 18px; font-weight: 700; color: #111; }
  .header p { font-size: 13px; color: #6b7280; margin-top: 3px; }
  .controls { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 14px 28px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .controls input { border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 11px; font-size: 13px; width: 200px; outline: none; }
  .controls input:focus { border-color: #6366f1; }
  .controls select { border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 11px; font-size: 13px; background: #fff; cursor: pointer; outline: none; }
  .controls select:focus { border-color: #6366f1; }
  .row-count { font-size: 13px; color: #6b7280; margin-left: auto; }
  .batch-bar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 10px 28px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .batch-bar span { font-size: 12px; color: #9ca3af; margin-right: 4px; }
  .batch-btn { font-size: 12px; font-weight: 600; background: #f0f0ff; color: #4f46e5; border: 1px solid #c7d2fe; border-radius: 5px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }
  .batch-btn:hover { background: #e0e7ff; }
  .popup-tip { font-size: 11px; color: #9ca3af; margin-left: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f9fafb; border-bottom: 2px solid #e5e7eb; padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px; color: #374151; cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { background: #f1f5f9; }
  thead th .sort-icon { display: inline-block; margin-left: 4px; color: #9ca3af; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
  tbody tr:hover { background: #fafbff; }
  tbody td { padding: 9px 14px; vertical-align: middle; }
  .batch-divider td { background: #f4f4f8; font-size: 11px; font-weight: 600; color: #9ca3af; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 14px; }
  .li-icon { display: inline-flex; align-items: center; }
  .li-icon a { display: inline-flex; }
  .li-icon svg { display: block; }
  .li-dim { opacity: 0.15; }
  .name { font-weight: 600; color: #111; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; border-radius: 99px; padding: 2px 9px; white-space: nowrap; }
  /* Event badge */
  .ev-fischtank { background: #fce7f3; color: #9d174d; }
  /* Status badges */
  .st-confirmed { background: #d1fae5; color: #065f46; }
  .st-guessed   { background: #fef9c3; color: #854d0e; }
  .st-na        { background: #f3f4f6; color: #6b7280; }
  /* Type badges */
  .tp-vc        { background: #ede9fe; color: #5b21b6; }
  .tp-lp        { background: #dbeafe; color: #1e40af; }
  .tp-impact    { background: #d1fae5; color: #065f46; }
  .tp-investor  { background: #e0f2fe; color: #075985; }
  .tp-policy    { background: #fce7f3; color: #9d174d; }
  .tp-academic  { background: #fef3c7; color: #92400e; }
  .tp-consultant{ background: #f0fdf4; color: #166534; }
  .tp-founder   { background: #fff7ed; color: #9a3412; }
  .tp-media     { background: #fee2e2; color: #991b1b; }
  .tp-unknown   { background: #f3f4f6; color: #6b7280; }
  .table-wrap { overflow-x: auto; }

<body>

<div class="header">

  <p>61 attendees · <a href="https://luma.com/ihohs2le" target="_blank" style="color:#6b7280">luma.com/ihohs2le</a></p>

<div class="controls">
  <input type="text" id="search" placeholder="Search name…" oninput="render()">

    <option value="">All types</option>
    <option value="VC">VC</option>
    <option value="LP">LP</option>

    <option value="Investor">Investor</option>
    <option value="Founder/Operator">Founder/Operator</option>
    <option value="Policy/NGO">Policy/NGO</option>
    <option value="Academic/Research">Academic/Research</option>
    <option value="Consultant/Advisor">Consultant/Advisor</option>
    <option value="Media/Journalist">Media/Journalist</option>
    <option value="Unknown">Unknown</option>
  </select>
  <select id="filterStatus" onchange="render()">
    <option value="">All statuses</option>
    <option value="Confirmed">Confirmed</option>
    <option value="Guessed">Guessed</option>
    <option value="N/A">N/A</option>
  </select>
  <span class="row-count" id="rowCount"></span>
</div>

<div class="batch-bar" id="batchBar">
  <span>Open LinkedIn:</span>
  <span class="popup-tip">Allow popups on the launcher tab</span>
</div>

<div class="table-wrap">
<table>

    <tr>

  <tbody id="tbody"></tbody>
</table>

  [null,"Jyotika Chandhoke","FischTank PR Happy Hour","https://linkedin.com/in/jyotika-chandhoke","Confirmed","Unknown"],
  [null,"Kalp","FischTank PR Happy Hour","https://linkedin.com/in/k-oza-9a86b911b","Confirmed","Unknown"],
  [null,"Katherine Cunningham","FischTank PR Happy Hour","https://linkedin.com/in/katherine-cunningham-b4057635","Guessed","Consultant/Advisor"],

  [null,"Michael Canova","FischTank PR Happy Hour","https://linkedin.com/in/michael-canova-83840bb6","Guessed","Consultant/Advisor"],
  [null,"Mike Gray","FischTank PR Happy Hour","https://linkedin.com/in/michaelgray6","Confirmed","Unknown"],
  [null,"Miriam Lujan","FischTank PR Happy Hour","https://linkedin.com/in/miriam-gonzalez-lujan-mba-finance-ma-","Confirmed","Unknown"],
  [null,"Molly Taft","FischTank PR Happy Hour","https://linkedin.com/in/mollytaft","Guessed","Media/Journalist"],
  [null,"Natalie Zhang","FischTank PR Happy Hour","https://linkedin.com/in/nataliejzhang","Guessed","Unknown"],

  [null,"Nicola Phillips","FischTank PR Happy Hour","https://linkedin.com/in/nicolahphillips","Confirmed","Unknown"],
  [null,"Patrick Lewis","FischTank PR Happy Hour","https://linkedin.com/in/patrick-l-6791b7220","Confirmed","Unknown"],
  [null,"Reena Karasin","FischTank PR Happy Hour","https://linkedin.com/in/reena-karasin-5630a1104","Guessed","Founder/Operator"],
  [null,"Rob Kreis","FischTank PR Happy Hour","https://linkedin.com/in/robert-kreis-29b51773","Confirmed","Unknown"],
  [null,"Sameer Bhalesha","FischTank PR Happy Hour","https://linkedin.com/in/sameerbhalesha","Confirmed","Unknown"],
  [null,"Stephanie Primavera","FischTank PR Happy Hour","https://linkedin.com/in/stephanieprimavera","Confirmed","Unknown"],
  [null,"Stevie Robinson","FischTank PR Happy Hour","https://linkedin.com/in/srobinson30","Guessed","Media/Journalist"],
  [null,"TeraWatt Infrastructure","FischTank PR Happy Hour",null,"N/A","Founder/Operator"],
  [null,"Tricia Crimmins","FischTank PR Happy Hour","https://linkedin.com/in/triciacrimmins","Guessed","Media/Journalist"],
  [null,"Wes Mangum","FischTank PR Happy Hour","https://linkedin.com/in/wes-mangum-12934614a","Confirmed","Unknown"],
  [null,"Xander Dailey","FischTank PR Happy Hour","https://linkedin.com/in/xander-dailey","Confirmed","Unknown"],
];

const TYPE_ORDER = ["VC","LP","Impact Investor","Investor","Founder/Operator","Media/Journalist","Consultant/Advisor","Policy/NGO","Academic/Research","Unknown"];
const STATUS_ORDER = ["Confirmed","Guessed","N/A"];

function typeClass(t) {
  const m = {"VC":"tp-vc","LP":"tp-lp","Impact Investor":"tp-impact","Investor":"tp-investor",
    "Founder/Operator":"tp-founder","Policy/NGO":"tp-policy","Academic/Research":"tp-academic",
    "Consultant/Advisor":"tp-consultant","Media/Journalist":"tp-media","Unknown":"tp-unknown"};
  return m[t] || "tp-unknown";
}
function statusClass(s) {
  return {"Confirmed":"st-confirmed","Guessed":"st-guessed","N/A":"st-na"}[s] || "st-na";
}

const LI_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="#0a66c2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`;

let sortCol = 5, sortDir = 1;

function sortKey(row) {
  if (sortCol === 5) return [TYPE_ORDER.indexOf(row[5]) < 0 ? 99 : TYPE_ORDER.indexOf(row[5]), STATUS_ORDER.indexOf(row[4]), row[1]];
  if (sortCol === 4) return [STATUS_ORDER.indexOf(row[4]) < 0 ? 99 : STATUS_ORDER.indexOf(row[4]), row[1]];
  return [row[sortCol] || ""];
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  const ft = document.getElementById('filterType').value;
  const fs = document.getElementById('filterStatus').value;
  return DATA.filter(r =>
    (!q || r[1].toLowerCase().includes(q)) &&
    (!ft || r[5] === ft) &&
    (!fs || r[4] === fs)
  );
}

function render() {
  const rows = filtered().slice().sort((a, b) => {
    const ka = sortKey(a), kb = sortKey(b);
    for (let i = 0; i < ka.length; i++) {
      if (ka[i] < kb[i]) return -1 * sortDir;
      if (ka[i] > kb[i]) return 1 * sortDir;
    }
    return 0;
  });

  document.getElementById('rowCount').textContent = rows.length + ' of ' + DATA.length;

  // Batch buttons
  const bar = document.getElementById('batchBar');
  bar.innerHTML = '<span>Open LinkedIn:</span>';
  const liRows = rows.filter(r => r[3]);
  for (let i = 0; i < liRows.length; i += 10) {
    const batch = liRows.slice(i, i + 10);
    const urls = batch.map(r => r[3]);
    const btn = document.createElement('button');
    btn.className = 'batch-btn';
    btn.textContent = `Batch ${Math.floor(i/10)+1} (${urls.length})`;
    btn.onclick = (function(u) {
      return function() {
        const script = u.map(url => `window.open(${JSON.stringify(url)},'_blank');`).join('');
        const page = `<html><body><script>window.onload=function(){${script}window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ${u.length} tabs…</p></body></html>`;
        const blob = new Blob([page], {type:'text/html'});
        window.open(URL.createObjectURL(blob),'_blank');
      };
    })(urls);
    bar.appendChild(btn);
  }
  const tip = document.createElement('span');
  tip.className = 'popup-tip';
  tip.textContent = 'Allow popups on the launcher tab';
  bar.appendChild(tip);

  // Table rows
  const tbody = document.getElementById('tbody');
  let html = '';
  rows.forEach((row, idx) => {
    if (idx % 10 === 0) {
      const batchNum = Math.floor(idx/10) + 1;
      const start = idx + 1, end = Math.min(idx + 10, rows.length);
      html += `<tr class="batch-divider"><td colspan="5">Batch ${batchNum} · rows ${start}–${end}</td></tr>`;
    }
    const li = row[3];
    const liCell = li
      ? `<div class="li-icon"><a href="${li}" target="_blank">${LI_SVG}</a></div>`
      : `<div class="li-icon li-dim">${LI_SVG}</div>`;
    html += `<tr>
      <td>${liCell}</td>
      <td class="name">${row[1]}</td>
      <td><span class="badge ev-fischtank">${row[2]}</span></td>
      <td><span class="badge ${statusClass(row[4])}">${row[4]}</span></td>
      <td><span class="badge ${typeClass(row[5])}">${row[5]}</span></td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

// Sortable headers
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = parseInt(th.dataset.col);
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    render();
  });
});

render();
</script>

</html>
