<title>FischTank PR Happy Hour · Attendees</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; }

  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white; padding: 32px 40px; margin-bottom: 24px;
  }
  .header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .header p { font-size: 14px; opacity: 0.7; }

  /* ── Segment Summary Cards ── */
  .segment-cards {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin: 0 24px 16px; padding: 0;
  }
  .seg-card {
    background: white; border-radius: 12px; padding: 14px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s;
    min-width: 110px; text-align: center; user-select: none;
  }
  .seg-card:hover { border-color: #c0c8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  .seg-card.active { border-color: #0f3460; background: #f0f4ff; }
  .seg-card .seg-count { font-size: 28px; font-weight: 800; line-height: 1; }
  .seg-card .seg-label { font-size: 11px; font-weight: 600; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .seg-card[data-seg="Investor/VC"] .seg-count { color: #1565c0; }
  .seg-card[data-seg="Founder"]     .seg-count { color: #2e7d32; }
  .seg-card[data-seg="Press"]       .seg-count { color: #6a1b9a; }
  .seg-card[data-seg="PR/Agency"]   .seg-count { color: #e65100; }
  .seg-card[data-seg="Other"]       .seg-count { color: #555; }
  .seg-card[data-seg="all"]         .seg-count { color: #0f3460; }

  /* ── Controls ── */
  .controls {
    background: white; border-radius: 12px; padding: 16px 20px;
    margin: 0 24px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .controls input, .controls select {
    border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 12px;
    font-size: 13px; outline: none; color: #333; transition: border-color 0.2s;
  }
  .controls input:focus, .controls select:focus { border-color: #0f3460; }
  .controls input { flex: 1; min-width: 200px; }
  .count-badge {
    margin-left: auto; background: #f0f4ff; color: #0f3460;
    border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600;
  }
  .starred-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: #555; cursor: pointer; white-space: nowrap;
  }
  .starred-toggle input[type=checkbox] { cursor: pointer; width: 14px; height: 14px; accent-color: #f59e0b; flex-shrink: 0; }

  /* ── Batch buttons ── */
  .batch-buttons {
    margin: 0 24px 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .batch-tip { font-size: 11px; color: #999; }
  .batch-btn {
    background: #0f3460; color: white; border: none; border-radius: 8px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  .batch-btn:hover { background: #1a5276; }
  .open-starred-btn {
    background: #f59e0b; color: white; border: none; border-radius: 8px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background 0.2s; white-space: nowrap; display: none;
  }
  .open-starred-btn:hover { background: #d97706; }

  /* ── Table ── */
  .table-wrap { margin: 0 24px 40px; overflow: auto; max-height: 75vh; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  table { width: 100%; border-collapse: collapse; background: white; }
  thead th {
    background: #f5f7ff; padding: 12px 16px; text-align: left;
    font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase;
    letter-spacing: 0.05em; cursor: pointer; user-select: none;
    border-bottom: 2px solid #e8ecff; white-space: nowrap;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 0 #e8ecff;
  }
  thead th:hover { background: #eef0ff; }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  thead th.sorted .sort-arrow { opacity: 1; color: #0f3460; }
  tbody tr { border-bottom: 1px solid #f0f2f8; transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafbff; }
  tbody tr.worth-meeting { background: #fffde7; }
  tbody tr.worth-meeting:hover { background: #fff9c4; }
  td { padding: 6px 12px; vertical-align: middle; font-size: 13px; }

  .batch-divider td {
    background: #f5f7ff; font-size: 11px; font-weight: 700;
    color: #888; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 6px 16px; border-bottom: 1px solid #e8ecff;
  }

  /* ── Expand arrow ── */
  .td-expand { width: 28px; text-align: center; padding: 0 4px !important; }
  .expand-btn {
    background: none; border: none; cursor: pointer; padding: 4px;
    color: #bbb; font-size: 11px; line-height: 1;
    transition: color 0.15s, transform 0.2s; display: inline-block;
  }
  .expand-btn:hover { color: #0f3460; }
  .expand-btn.open { transform: rotate(90deg); color: #0f3460; }

  /* ── Shortlist checkbox ── */
  .td-cb { width: 36px; text-align: center; }
  .shortlist-cb {
    width: 16px; height: 16px; cursor: pointer; accent-color: #f59e0b;
    flex-shrink: 0;
  }

  /* ── Photo / Avatar ── */
  .td-photo { width: 60px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid #e8ecff; }

  /* ── LI icon ── */
  .td-li { width: 36px; text-align: center; }
  .li-link { display: inline-flex; align-items: center; justify-content: center; }
  .li-link.grey { opacity: 0.15; cursor: default; pointer-events: none; }

  /* ── Name cell ── */
  .td-name { min-width: 140px; }
  .name-text { font-weight: 600; color: #1a1a2e; display: block; }

  /* ── Tags / pills ── */
  .tags-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .tag-investor { background: #dbeafe; color: #1565c0; }
  .tag-founder  { background: #dcfce7; color: #166534; }
  .tag-press    { background: #f3e8ff; color: #6b21a8; }
  .tag-agency   { background: #ffedd5; color: #9a3412; }
  .tag-other    { background: #f1f5f9; color: #475569; }
  .tag-worth    { background: #fef08a; color: #854d0e; }

  /* ── Title + Seniority ── */
  .td-title { min-width: 160px; color: #555; }
  .title-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; white-space: nowrap;
  }
  .badge-csuite   { background: #0f3460; color: white; }
  .badge-vpdir    { background: #1565c0; color: white; }
  .badge-senior   { background: #e3f2fd; color: #0d47a1; }
  .badge-associate { background: #f5f5f5; color: #666; }

  /* ── Company ── */
  .td-company { min-width: 160px; }
  .company-cell { display: flex; align-items: center; gap: 8px; }
  .company-logo {
    width: 28px; height: 28px; border-radius: 5px; object-fit: contain;
    border: 1px solid #eee; background: white; flex-shrink: 0;
  }
  .company-name { color: #333; font-weight: 500; }

  /* ── About ── */
  .td-about { min-width: 200px; max-width: 300px; color: #555; font-size: 12px; line-height: 1.4; }
  .about-text { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .about-text.expanded { -webkit-line-clamp: unset; display: block; }

  .td-status { width: 36px; text-align: center; }
  .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }

  @media (max-width: 600px) {
    .header { padding: 20px; }
    .controls, .table-wrap, .batch-buttons, .segment-cards { margin: 0 12px 12px; }
  }
</style>
</head>

// ── Classification helpers ──────────────────────────────────────────────────

function getSegment(r) {
  const title   = (r[2]||'').toLowerCase();
  const company = (r[3]||'').toLowerCase();
  const about   = (r[7]||'').toLowerCase();

  // Press / Media — check outlet names and titles first
  const pressOutlets = ['heatmap news','cipher news','canary media','financial times','wall street journal','wsj','cnbc','abc news','morning brew','inside climate news','wired','mother jones','bloomberg','reuters','axios','techcrunch'];
  const pressTitles  = ['reporter','journalist','correspondent','editor','producer','writer & editor'];
  if (pressTitles.some(t => title.includes(t)) || pressOutlets.some(c => company.includes(c))) return 'Press';

  // PR / Agency — FischTank staff and comms roles
  if (company.includes('fischtank')) return 'PR/Agency';
  if (['account director','account manager','account executive','media relations','public relations'].some(t => title.includes(t))) return 'PR/Agency';
  if (title.includes('communications') && !title.includes('co-founder') && !title.includes('ceo')) return 'PR/Agency';

  // Investor / VC / FO — fund companies or investing titles/about
  const vcCompanies = ['streetlife ventures','renown capital','eig','rvc','barclays investment'];
  if (vcCompanies.some(c => company.includes(c))) return 'Investor/VC';
  if (company.includes('ventures') || (company.includes('capital') && !company.includes('hannon'))) return 'Investor/VC';
  if (['investor','managing partner','venture partner'].some(t => title.includes(t))) return 'Investor/VC';
  if (about.includes('family office') || about.includes('single family office') || about.includes('sfo')) return 'Investor/VC';
  if (about.includes('investing in') && (about.includes('seed') || about.includes('series') || about.includes('fund'))) return 'Investor/VC';
  if (title.includes('entrepreneur') && title.includes('investor')) return 'Investor/VC';

  // Founder / Startup
  if (['founder','co-founder','ceo'].some(t => title.includes(t))) return 'Founder';
  if (about.includes('serial entrepreneur')) return 'Founder';

  return 'Other';
}

function getSeniority(title) {
  if (!title) return '';
  const t = title.toLowerCase();
  if (/\bceo\b|\bcfo\b|\bcoo\b|\bcto\b|\bcmo\b|chief |managing partner|\bfounder\b|co-founder|president/.test(t)) return 'C-Suite';
  if (/\bvp\b|vice president|\bsvp\b|\bevp\b|\bdirector\b|\bpartner\b/.test(t)) return 'VP/Dir';
  if (/\bsenior\b|\bsr\.\b|head of|lead |principal|\bmanager\b/.test(t)) return 'Senior';
  if (/\bassociate\b|\banalyst\b|\bcoordinator\b|account executive|specialist|engineer/.test(t)) return 'Associate';
  return '';
}

function isWorthMeeting(seg) {
  return seg === 'Investor/VC' || seg === 'Founder';
}

// ── Expanded rows ────────────────────────────────────────────────────────────

const expandedRows = new Set();

function toggleExpand(name) {
  if (expandedRows.has(name)) expandedRows.delete(name); else expandedRows.add(name);
  // Update just the affected row in-place (no full re-render)
  document.querySelectorAll('tr[data-name]').forEach(tr => {
    if (tr.dataset.name !== name) return;
    const expanded = expandedRows.has(name);
    const aboutDiv = tr.querySelector('.about-text');
    const btn = tr.querySelector('.expand-btn');
    if (aboutDiv) aboutDiv.classList.toggle('expanded', expanded);
    if (btn) btn.classList.toggle('open', expanded);
  });
}

// ── Shortlist (localStorage) ─────────────────────────────────────────────────

const STORE_KEY = 'fischtank_starred';
function getStarred() {
  try { return new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]')); } catch { return new Set(); }
}
function saveStarred(set) {
  localStorage.setItem(STORE_KEY, JSON.stringify([...set]));
}
function toggleStar(name, cb) {
  const s = getStarred();
  if (cb.checked) s.add(name); else s.delete(name);
  saveStarred(s);
  updateOpenStarredBtn();
  // Only full re-render if "shortlisted only" filter is active
  if (document.getElementById('filterStarred').checked) renderTable();
}

// ── Segment cards ───────────────────────────────────────────────────────────

function buildSegmentCards() {
  const counts = { all: DATA.length, 'Investor/VC': 0, 'Founder': 0, 'Press': 0, 'PR/Agency': 0, 'Other': 0 };
  DATA.forEach(r => { const s = getSegment(r); counts[s] = (counts[s]||0) + 1; });

  const labels = [
    { seg: 'all',         emoji: '👥', label: 'All' },
    { seg: 'Investor/VC', emoji: '💼', label: 'Investor / VC / FO' },
    { seg: 'Founder',     emoji: '🚀', label: 'Founders' },
    { seg: 'Press',       emoji: '📰', label: 'Press / Media' },
    { seg: 'PR/Agency',   emoji: '📣', label: 'PR / Agency' },
    { seg: 'Other',       emoji: '🔹', label: 'Other' },
  ];

  const container = document.getElementById('segmentCards');
  container.innerHTML = '';
  labels.forEach(({ seg, emoji, label }) => {
    const card = document.createElement('div');
    card.className = 'seg-card' + (seg === activeSegment ? ' active' : '');
    card.dataset.seg = seg;
    card.innerHTML = `<div class="seg-count">${counts[seg] || 0}</div><div class="seg-label">${emoji} ${label}</div>`;
    card.addEventListener('click', () => {
      activeSegment = seg;
      document.querySelectorAll('.seg-card').forEach(c => c.classList.toggle('active', c.dataset.seg === seg));
      renderTable();
    });
    container.appendChild(card);
  });
}

// ── Open-starred button ─────────────────────────────────────────────────────

function updateOpenStarredBtn() {
  const starred = getStarred();
  let btn = document.getElementById('openStarredBtn');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'openStarredBtn';
    btn.className = 'open-starred-btn';
    btn.onclick = openAllStarred;
    document.getElementById('batchButtons').prepend(btn);
  }
  btn.style.display = starred.size ? 'inline-block' : 'none';
  btn.textContent = `⭐ Open ${starred.size} Starred`;
}

function openAllStarred() {
  const starred = getStarred();
  const urls = DATA.filter(r => r[5] && starred.has(r[1])).map(r => r[5]);
  if (!urls.length) return;
  const s = urls.map(x => 'window.open(' + JSON.stringify(x) + ',"_blank");').join('');
  const p = '<html><body><script>window.onload=function(){' + s + 'window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ' + urls.length + ' starred profiles\u2026</p></body></html>';
  window.open(URL.createObjectURL(new Blob([p], {type:'text/html'})), '_blank');
}

// ── Render ──────────────────────────────────────────────────────────────────

function renderTable() {
  const search      = document.getElementById('search').value.toLowerCase();
  const fc          = document.getElementById('filterCompany').value;
  const fs          = document.getElementById('filterStatus').value;
  const starredOnly = document.getElementById('filterStarred').checked;
  const starred     = getStarred();

  const filtered = currentData.filter(r => {
    const ok1 = !search || r[1].toLowerCase().includes(search) || r[2].toLowerCase().includes(search) || r[3].toLowerCase().includes(search);
    const ok2 = !fc || r[3] === fc;
    const ok3 = !fs || r[6] === fs;
    const ok4 = activeSegment === 'all' || getSegment(r) === activeSegment;
    const ok5 = !starredOnly || starred.has(r[1]);
    return ok1 && ok2 && ok3 && ok4 && ok5;
  });

  document.getElementById('countBadge').textContent = filtered.length + ' of ' + DATA.length;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  filtered.forEach((r, i) => {
    if (i % 10 === 0) {
      const d = tbody.insertRow(); d.className = 'batch-divider';
      const c = d.insertCell(); c.colSpan = 9;
      c.textContent = 'Batch ' + (Math.floor(i/10)+1) + ' \u00B7 rows ' + (i+1) + '\u2013' + Math.min(i+10, filtered.length);
    }

    const seg       = getSegment(r);
    const seniority = getSeniority(r[2]);
    const worth     = isWorthMeeting(seg);
    const isStarred = starred.has(r[1]);
    const isExpanded = expandedRows.has(r[1]);

    const tr = tbody.insertRow();
    tr.dataset.name = r[1];
    if (worth) tr.classList.add('worth-meeting');

    const logo = r[4] ? 'https://www.google.com/s2/favicons?domain=' + r[4] + '&sz=64' : null;
    const about = r[7] || '';
    const aboutHtml = about
      ? '<div class="about-text' + (isExpanded ? ' expanded' : '') + '">' + about + '</div>'
      : '<span style="color:#ccc">\u2014</span>';

    const liSvg   = r[6] === 'Guessed' ? LI_SVG_YELLOW : r[6] === 'Confirmed' ? LI_SVG : LI_SVG_GREY;
    const liTitle = r[6] === 'Guessed' ? 'Guessed LinkedIn' : r[6] === 'Confirmed' ? 'Confirmed LinkedIn' : 'No LinkedIn';

    // Segment tag
    const scfg = SEG_CONFIG[seg] || SEG_CONFIG['Other'];
    let tagsHtml = '<span class="tag ' + scfg.cls + '">' + scfg.label + '</span>';
    if (worth) tagsHtml += ' <span class="tag tag-worth">&#9733; Priority</span>';

    // Seniority badge
    const badgeClass = { 'C-Suite': 'badge-csuite', 'VP/Dir': 'badge-vpdir', 'Senior': 'badge-senior', 'Associate': 'badge-associate' }[seniority] || '';
    const badgeHtml = seniority ? '<span class="badge ' + badgeClass + '">' + seniority + '</span>' : '';

    // Encode name safely for use inside HTML attribute values
    const nameAttr = r[1].replace(/&/g,'&amp;').replace(/"/g,'&quot;');

    const expandBtn = about
      ? '<button class="expand-btn' + (isExpanded ? ' open' : '') + '" tabindex="-1" title="Expand / collapse bio">&#9654;</button>'
      : '';

    tr.innerHTML =
      '<td class="td-cb"><input type="checkbox" class="shortlist-cb" ' + (isStarred ? 'checked' : '') + ' onchange="toggleStar(&quot;' + nameAttr + '&quot;, this)" title="Shortlist"></td>' +
      '<td class="td-photo"><img class="avatar" src="' + r[0] + '" alt="' + nameAttr + '" onerror="this.src=\'https://cdn.lu.ma/avatars-default/avatar_0.png\'"></td>' +
      '<td class="td-li">' + (r[5] ? '<a class="li-link" href="' + r[5] + '" target="_blank" rel="noopener" title="' + liTitle + '">' + liSvg + '</a>' : '<span class="li-link grey" title="' + liTitle + '">' + liSvg + '</span>') + '</td>' +
      '<td class="td-name"><span class="name-text">' + r[1] + '</span><div class="tags-row">' + tagsHtml + '</div></td>' +
      '<td class="td-title"><div class="title-wrap">' + (r[2] ? '<span>' + r[2] + '</span>' : '<span style="color:#ccc">\u2014</span>') + badgeHtml + '</div></td>' +
      '<td class="td-company"><div class="company-cell">' +
        (logo ? '<img class="company-logo" src="' + logo + '" alt="" onerror="this.style.display=\'none\'" loading="lazy">' : '') +
        '<span class="company-name">' + (r[3] || '<span style="color:#ccc">\u2014</span>') + '</span>' +
      '</div></td>' +
      '<td class="td-about">' + aboutHtml + '</td>' +
      '<td class="td-expand">' + expandBtn + '</td>';

    if (about) {
      tr.style.cursor = 'pointer';
      tr.addEventListener('click', (function(name) { return function(e) {
        if (e.target.closest('a, input')) return;
        toggleExpand(name);
      }; })(r[1]));
    }
  });

  updateBatchBtns(filtered);
}

// ── Batch buttons ───────────────────────────────────────────────────────────

function updateBatchBtns(filtered) {
  const urls = filtered.filter(r => r[5]).map(r => r[5]);
  const wrap = document.getElementById('batchButtons');
  // Preserve open-starred btn if it exists
  const existing = document.getElementById('openStarredBtn');
  wrap.innerHTML = '<span class="batch-tip">Open LinkedIn in batch (allow popups for launcher tab):</span>';
  if (existing) wrap.prepend(existing);
  for (let i = 0; i < urls.length; i += 10) {
    const chunk = urls.slice(i, i+10);
    const btn = document.createElement('button');
    btn.className = 'batch-btn';
    btn.textContent = 'Batch ' + (Math.floor(i/10)+1) + ' (' + chunk.length + ')';
    btn.onclick = (function(u) { return function() {
      const s = u.map(x => 'window.open(' + JSON.stringify(x) + ',"_blank");').join('');
      const p = '<html><body><script>window.onload=function(){' + s + 'window.close();}<\/script><p style="font-family:sans-serif;padding:20px">Opening ' + u.length + ' tabs\u2026</p></body></html>';
      window.open(URL.createObjectURL(new Blob([p], {type:'text/html'})), '_blank');
    }; })(chunk);
    wrap.appendChild(btn);
  }
}

function sortBy(col) {
  const idx = {name:1, title:2, company:3, about:7, status:6};
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  const i = idx[col];
  currentData.sort((a, b) => {
    const av = (a[i]||'').toLowerCase(), bv = (b[i]||'').toLowerCase();
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    const sa = th.querySelector('.sort-arrow');
    if (sa) sa.innerHTML = '&#8597;';
  });
  const colNames = [null, null, null, 'name', 'title', 'company', 'about', null];
  document.querySelectorAll('thead th').forEach((th, i) => {
    if (colNames[i] === col) {
      th.classList.add('sorted');
      const sa = th.querySelector('.sort-arrow');
      if (sa) sa.innerHTML = sortAsc ? '&#8593;' : '&#8595;';
    }
  });
  renderTable();
}

// ── Init ────────────────────────────────────────────────────────────────────

(function populateFilters() {
  const companies = [...new Set(DATA.map(r => r[3]).filter(Boolean))].sort();
  const sel = document.getElementById('filterCompany');
  companies.forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; sel.appendChild(o); });
})();

document.getElementById('search').addEventListener('input', renderTable);
document.getElementById('filterCompany').addEventListener('change', renderTable);
document.getElementById('filterStatus').addEventListener('change', renderTable);
document.getElementById('filterStarred').addEventListener('change', renderTable);

buildSegmentCards();
updateOpenStarredBtn();
renderTable();
</script>
